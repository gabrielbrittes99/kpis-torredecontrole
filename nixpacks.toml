[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.uvicorn", "nodejs_20", "gcc"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = "./start.sh"
