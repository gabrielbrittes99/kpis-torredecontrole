[phases.setup]
nixPkgs = ["python3", "python311Packages.pip", "nodejs", "gcc"]

[phases.install]
cmds = [
    "python3 -m pip install --upgrade pip",
    "python3 -m pip install -r backend/requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = "./start.sh"
