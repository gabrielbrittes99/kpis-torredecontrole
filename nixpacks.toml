[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20", "gcc"]

[phases.install]
cmds = [
    "pip install -r backend/requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = "cd backend && python3.11 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
